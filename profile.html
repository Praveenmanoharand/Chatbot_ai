<!DOCTYPE html>
<html lang="en">

<head>
    <script>
        // Theme initialization - Must be first to prevent flash
        (function () {
            const settings = localStorage.getItem('nova_settings');
            let isDark = true;
            if (settings) {
                try {
                    const parsed = JSON.parse(settings);
                    if (parsed && typeof parsed.darkMode !== 'undefined') {
                        isDark = parsed.darkMode;
                    }
                } catch (e) {
                    isDark = true;
                }
            }
            document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
            // Immediate background color to eliminate flash
            document.write('<style>html,body{background-color:' + (isDark ? '#0a0a0b' : '#ffffff') + ' !important;}</style>');
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile - Aura AI</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Space+Grotesk:wght@300..700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer">

    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="profile.css">
</head>

<body>
    <!-- Background Effects -->
    <div class="background-effects">
        <div class="gradient-orb gradient-orb-1"></div>
        <div class="gradient-orb gradient-orb-2"></div>
        <div class="gradient-orb gradient-orb-3"></div>
        <div class="noise-overlay"></div>
    </div>

    <!-- Mobile Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Main Application Container -->
    <div class="app-container">

        <!-- Sidebar (Reused) -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo-container">
                    <span class="logo-text">Aura AI</span>
                </div>
                <button class="close-sidebar-btn" id="closeSidebarBtn" aria-label="Close sidebar">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <div class="sidebar-actions">
                <a href="index.html" class="new-chat-btn"
                    style="text-decoration: none; display: flex; align-items: center; justify-content: center;">
                    <i class="fas fa-comment-dots"></i>
                    <span>Back to Chat</span>
                </a>
            </div>

            <div class="sidebar-footer">
                <div class="footer-actions">
                    <button class="footer-action-btn" id="settingsBtn">
                        <i class="fas fa-cog"></i>
                        <span>Settings</span>
                    </button>
                    <button class="footer-action-btn active" id="profileBtn">
                        <div class="profile-avatar">
                            <i class="fas fa-user"></i>
                        </div>
                        <span>Profile</span>
                    </button>
                </div>
                <div class="version-info">
                    <span>Aura AI v2.4.1</span>
                </div>
            </div>
        </aside>

        <!-- Main Profile Area -->
        <main class="chat-main">
            <header class="chat-header">
                <div class="header-left">
                    <button class="menu-toggle-btn" id="menuToggleBtn" aria-label="Toggle sidebar">
                        <i class="fas fa-bars"></i>
                    </button>
                    <div class="bot-info">
                        <div class="bot-avatar-container">
                            <div class="bot-avatar">
                                <i class="fas fa-user-shield"></i>
                            </div>
                        </div>
                        <div class="bot-details">
                            <h1 class="bot-name">User Dashboard</h1>
                            <span class="bot-status">Manage your presence and activity</span>
                        </div>
                    </div>
                </div>
            </header>

            <div class="profile-container">
                <div class="profile-content">
                    <!-- Profile Card -->
                    <div class="section-card profile-card" id="profileCard">
                        <div class="profile-header-large">
                            <div class="avatar-large-wrapper">
                                <div class="avatar-large">
                                    <i class="fas fa-user"></i>
                                </div>
                                <button class="edit-avatar-btn" title="Change Avatar">
                                    <i class="fas fa-camera"></i>
                                </button>
                            </div>
                            <div class="profile-info-large">
                                <h2 id="userNameDisplay">Guest User</h2>
                                <p id="userEmailDisplay">guest@example.com</p>
                                <div class="badge-row">
                                    <span class="status-badge online">Active Now</span>
                                    <span class="tier-badge">Pro Member</span>
                                </div>
                            </div>
                            <div class="profile-actions-header">
                                <button class="action-btn-line" id="editProfileBtn">
                                    <i class="fas fa-edit"></i> Edit Profile
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Account Settings -->
                    <div class="section-card settings-section">
                        <div class="card-header">
                            <i class="fas fa-sliders"></i>
                            <h2>Quick Preferences</h2>
                        </div>
                        <div class="preferences-grid">
                            <div class="pref-item">
                                <div class="pref-info">
                                    <span class="pref-label">Dark Mode</span>
                                    <span class="pref-desc">Toggle interface theme</span>
                                </div>
                                <label class="toggle-switch">
                                    <input type="checkbox" id="darkModeToggle" checked>
                                    <span class="toggle-slider"></span>
                                </label>
                            </div>
                            <div class="pref-item">
                                <div class="pref-info">
                                    <span class="pref-label">Compact Interface</span>
                                    <span class="pref-desc">Reduce screen spacing</span>
                                </div>
                                <label class="toggle-switch">
                                    <input type="checkbox" id="compactModeToggle">
                                    <span class="toggle-slider"></span>
                                </label>
                            </div>
                        </div>
                    </div>

                    <div class="dashboard-footer">
                        <button class="action-btn danger-btn" id="signOutBtn">
                            <i class="fas fa-sign-out-alt"></i> Sign Out
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Notification Toast -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="profile.js"></script>
</body>

</html>
