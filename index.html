<html lang="en">
<head>
    <script>
        // Theme initialization - Must be first to prevent flash
        (function() {
            const settings = localStorage.getItem('nova_settings');
            let isDark = true;
            if (settings) {
                try {
                    const parsed = JSON.parse(settings);
                    if (parsed && typeof parsed.darkMode !== 'undefined') {
                        isDark = parsed.darkMode;
                    }
                } catch (e) {
                    isDark = true;
                }
            }
            document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
            // Immediate background color to eliminate flash
            document.write('<style>html,body{background-color:' + (isDark ? '#0a0a0b' : '#ffffff') + ' !important;}</style>');
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aura AI - Secure Login</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-container">
            <div class="auth-header">
                <h1 id="authTitle">Welcome Back</h1>
                <p id="authSubtitle">Please enter your details to continue</p>
            </div>

            <!-- Tabs -->
            <div class="auth-tabs">
                <button class="auth-tab active" id="loginTab">Login</button>
                <button class="auth-tab" id="registerTab">Register</button>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="auth-form active">
                <div class="form-group">
                    <label for="loginEmail">Email ID</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="loginEmail" placeholder="name@example.com" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="loginPassword" placeholder="••••••••" required>
                        <button type="button" class="password-toggle"><i class="fas fa-eye"></i></button>
                    </div>
                </div>
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox"> <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-password">Forgot password?</a>
                </div>
                <button type="submit" class="submit-btn">
                    <span>Login</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <!-- Register Form -->
            <form id="registerForm" class="auth-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="regUsername">User Name</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user"></i>
                            <input type="text" id="regUsername" placeholder="John Doe" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="regEmail">Email ID</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="regEmail" placeholder="name@example.com" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="regDob">Date Of Birth</label>
                        <div class="input-wrapper">
                            <i class="fas fa-calendar"></i>
                            <input type="date" id="regDob" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="regMobile">Mobile Number</label>
                        <div class="input-wrapper">
                            <i class="fas fa-phone"></i>
                            <input type="tel" id="regMobile" placeholder="+1 (555) 000-0000" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="regPassword">Create a Strong Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="regPassword" placeholder="••••••••" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="regConfirmPassword">Confirm Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-shield-alt"></i>
                            <input type="password" id="regConfirmPassword" placeholder="••••••••" required>
                        </div>
                    </div>
                </div>
                <button type="submit" class="submit-btn" style="margin-top: 1.5rem;">
                    <span>Register</span>
                    <i class="fas fa-user-plus"></i>
                </button>
            </form>
            
            <div id="authMessage" class="auth-message"></div>
        </div>
    </div>
    
    <script src="auth.js"></script>
</body>
</html>
